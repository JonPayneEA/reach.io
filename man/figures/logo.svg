```
<!-- River gradient: deep teal to slate blue -->
<linearGradient id="riverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#1a6b7a"/>
  <stop offset="50%" stop-color="#0f4d6e"/>
  <stop offset="100%" stop-color="#0a3352"/>
</linearGradient>

<!-- Background gradient -->
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="60%" y2="100%">
  <stop offset="0%" stop-color="#0d1f2d"/>
  <stop offset="100%" stop-color="#071420"/>
</linearGradient>

<!-- Glow filter for river -->
<filter id="riverGlow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="6" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<!-- Soft glow for binary text -->
<filter id="binaryGlow">
  <feGaussianBlur stdDeviation="2.5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<!-- Input arrow marker -->
<marker id="arrowIn" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
  <path d="M0,0 L0,8 L8,4 z" fill="#4ecdc4" opacity="0.9"/>
</marker>

<!-- Output arrow marker -->
<marker id="arrowOut" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
  <path d="M0,0 L0,8 L8,4 z" fill="#f7c948" opacity="0.9"/>
</marker>

<!-- River paths: centre line runs full hex height y=18 to y=582 -->
<!-- Centre: meanders left then right across the hex -->
<path id="riverCentreLine" d="M260,18 C320,80 190,150 235,230 C275,300 330,320 300,390 C270,455 200,465 245,520 C265,548 260,565 260,582" fill="none"/>
<!-- ±15px offsets -->
<path id="riverLeft"       d="M245,18 C305,80 175,150 220,230 C260,300 315,320 285,390 C255,455 185,465 230,520 C250,548 245,565 245,582" fill="none"/>
<path id="riverRight"      d="M275,18 C335,80 205,150 250,230 C290,300 345,320 315,390 C285,455 215,465 260,520 C280,548 275,565 275,582" fill="none"/>
<!-- ±30px offsets -->
<path id="riverFarLeft"    d="M230,18 C290,80 160,150 205,230 C245,300 300,320 270,390 C240,455 170,465 215,520 C235,548 230,565 230,582" fill="none"/>
<path id="riverFarRight"   d="M290,18 C350,80 220,150 265,230 C305,300 360,320 330,390 C300,455 230,465 275,520 C295,548 290,565 290,582" fill="none"/>

<!-- Wide river body path (offset left/right of centre) -->
<path id="riverBody"
  d="M235,60 C265,80 170,140 210,200 C248,252 300,268 278,320
     C255,373 195,385 228,438 C248,465 236,520 236,545
     L284,545 C284,520 272,465 292,438
     C325,385 265,373 242,320
     C220,268 272,252 310,200
     C350,140 255,80 285,60 Z"
  fill="none"/>

<!-- Clip for river band only -->
<clipPath id="riverClip">
  <path d="M228,50 C268,72 162,138 202,198 C244,255 305,270 282,323
           C258,378 192,388 226,440 C247,467 234,525 234,548
           L286,548 C286,525 273,467 294,440
           C328,388 262,378 238,323
           C215,270 276,255 318,198
           C358,138 252,72 292,50 Z"/>
</clipPath>
